name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # the release job attaches assets

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # Modern SDR# ships as a single-file self-contained exe, so the managed
      # SDRSharp.* assemblies are not available as redistributable DLLs. Build the
      # minimal reference ("stub") assemblies from ./sdk into ./libs and compile
      # against those; at run time the references bind to the host's real
      # assemblies. See sdk/README.md.
      - name: Build SDR# reference assemblies
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path libs | Out-Null
          foreach ($proj in 'SDRSharp.Radio','SDRSharp.PanView','SDRSharp.Common') {
            dotnet build "sdk/$proj/$proj.csproj" -c Release
            if ($LASTEXITCODE -ne 0) { throw "Failed to build stub $proj" }
            Copy-Item "sdk/$proj/bin/Release/net9.0-windows/$proj.dll" -Destination "libs/$proj.dll" -Force
            Write-Host "Built libs/$proj.dll"
          }

      - name: Build (Release, x86)
        run: dotnet build SDRSharp.JAlert/SDRSharp.JAlert.csproj -c Release /p:Platform=x86

      - name: Stage package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dll = Get-ChildItem -Path SDRSharp.JAlert/bin -Recurse -Filter SDRSharp.JAlert.dll | Select-Object -First 1
          if (-not $dll) { throw "Build did not produce SDRSharp.JAlert.dll" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item $dll.FullName -Destination dist/ -Force
          Copy-Item Plugins.json.example -Destination dist/ -Force
          Copy-Item README.md -Destination dist/ -Force
          Compress-Archive -Path dist/* -DestinationPath SDRSharp.JAlert.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: SDRSharp.JAlert
          path: SDRSharp.JAlert.zip
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: SDRSharp.JAlert.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
