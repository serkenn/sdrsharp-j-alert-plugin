name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # the release job attaches assets

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          # net8.0-windows loads in both SDRSharp.dotnet8.exe and
          # SDRSharp.dotnet9.exe (a .NET 9 host can load a net8 assembly).
          dotnet-version: |
            8.0.x
            9.0.x

      # Modern SDR# ships as a single-file self-contained exe, so the managed
      # SDRSharp.* assemblies are not available as redistributable DLLs. Build the
      # minimal reference ("stub") assemblies from ./sdk into ./libs and compile
      # against those; at run time the references bind to the host's real
      # assemblies. See sdk/README.md.
      - name: Build SDR# reference assemblies
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path libs | Out-Null
          foreach ($proj in 'SDRSharp.Radio','SDRSharp.PanView','SDRSharp.Common') {
            dotnet build "sdk/$proj/$proj.csproj" -c Release
            if ($LASTEXITCODE -ne 0) { throw "Failed to build stub $proj" }
            Copy-Item "sdk/$proj/bin/Release/net8.0-windows/$proj.dll" -Destination "libs/$proj.dll" -Force
            Write-Host "Built libs/$proj.dll"
          }

      - name: Build (Release)
        run: dotnet build SDRSharp.JAlert/SDRSharp.JAlert.csproj -c Release

      # Integration test: prove the plugin loads and is recognized by reproducing
      # SDR#'s discovery logic against the REAL SDR# assemblies (extracted from the
      # single-file exe). Catches API/runtime/architecture mismatches that would
      # otherwise only show up as a silently-skipped plugin in SDR#.
      - name: Verify plugin loads (real SDR# assemblies)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Invoke-WebRequest -Uri 'https://airspy.com/?ddownload=3130' -OutFile sdrsharp.zip -UseBasicParsing -MaximumRedirection 10
          # The managed assemblies live inside the single-file exe; extract the zip,
          # then pull the assemblies out of the bundle.
          Expand-Archive -Path sdrsharp.zip -DestinationPath sdrdist -Force
          New-Item -ItemType Directory -Force -Path realdlls | Out-Null
          python tools/extract_bundle.py sdrdist/SDRSharp.dotnet8.exe realdlls
          if (-not (Test-Path realdlls/SDRSharp.Common.dll)) { throw "Failed to extract SDRSharp.Common.dll from SDR#" }
          # SDR#'s managed assemblies are x86 (ReadyToRun) — the host is a 32-bit
          # process — so the checker must run as x86 too. Publish it self-contained
          # win-x86 so it brings its own x86 desktop runtime.
          dotnet publish tools/PluginLoadCheck/PluginLoadCheck.csproj -c Release -r win-x86 --self-contained true
          $checker = Get-ChildItem -Path tools/PluginLoadCheck/bin -Recurse -Filter PluginLoadCheck.exe | Select-Object -First 1
          if (-not $checker) { throw "PluginLoadCheck.exe not produced" }
          $plugin = Get-ChildItem -Path SDRSharp.JAlert/bin -Recurse -Filter SDRSharp.JAlert.dll | Select-Object -First 1
          & $checker.FullName $plugin.FullName (Resolve-Path realdlls)
          if ($LASTEXITCODE -ne 0) { throw "Plugin load verification failed" }

      - name: Stage package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dll = Get-ChildItem -Path SDRSharp.JAlert/bin -Recurse -Filter SDRSharp.JAlert.dll | Select-Object -First 1
          if (-not $dll) { throw "Build did not produce SDRSharp.JAlert.dll" }
          # Lay out the zip so it extracts into SDR#'s Plugins/ folder as
          # Plugins/SDRSharp.JAlert/SDRSharp.JAlert.dll (auto-discovered; no
          # Plugins.json or config edit needed).
          New-Item -ItemType Directory -Force -Path dist/SDRSharp.JAlert | Out-Null
          Copy-Item $dll.FullName -Destination dist/SDRSharp.JAlert/ -Force
          Copy-Item README.md -Destination dist/SDRSharp.JAlert/ -Force
          Compress-Archive -Path dist/SDRSharp.JAlert -DestinationPath SDRSharp.JAlert.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: SDRSharp.JAlert
          path: SDRSharp.JAlert.zip
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: SDRSharp.JAlert.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
