name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # the release job attaches assets

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # The SDRSharp.* reference assemblies are not redistributable, so we fetch
      # the official SDR# x86 build at CI time and reference its DLLs from ./libs.
      - name: Fetch SDR# (x86) for reference DLLs
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path libs | Out-Null
          $url = 'https://airspy.com/downloads/sdrsharp-x86.zip'
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile sdrsharp.zip -UseBasicParsing
          Expand-Archive -Path sdrsharp.zip -DestinationPath sdrsharp -Force
          foreach ($dll in 'SDRSharp.Common.dll','SDRSharp.Radio.dll','SDRSharp.PanView.dll') {
            $src = Get-ChildItem -Path sdrsharp -Recurse -Filter $dll | Select-Object -First 1
            if (-not $src) { throw "Missing $dll in the SDR# download" }
            Copy-Item $src.FullName -Destination (Join-Path 'libs' $dll) -Force
            Write-Host "Copied $($src.FullName) -> libs/$dll"
          }

      - name: Build (Release, x86)
        run: dotnet build SDRSharp.JAlert/SDRSharp.JAlert.csproj -c Release /p:Platform=x86

      - name: Stage package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dll = Get-ChildItem -Path SDRSharp.JAlert/bin -Recurse -Filter SDRSharp.JAlert.dll | Select-Object -First 1
          if (-not $dll) { throw "Build did not produce SDRSharp.JAlert.dll" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item $dll.FullName -Destination dist/ -Force
          Copy-Item Plugins.json.example -Destination dist/ -Force
          Copy-Item README.md -Destination dist/ -Force
          Compress-Archive -Path dist/* -DestinationPath SDRSharp.JAlert.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: SDRSharp.JAlert
          path: SDRSharp.JAlert.zip
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: SDRSharp.JAlert.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
